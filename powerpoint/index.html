<!DOCTYPE html>
<html>
<head>
  <title>¡Mira esto tío!</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
    }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>
<body oncontextmenu="return false">
  <video id="trollvid" autoplay loop controls muted>
    <source src="https://URL_DEL_VIDEO_AQUI.mp4" type="video/mp4">
    Tu navegador es una mierda y no soporta vídeo.
  </video>

  <script>
    const vid = document.getElementById('trollvid');
    vid.volume = 1.0;
    vid.muted = false;

    // Intenta poner pantalla completa
    function goFullScreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) elem.requestFullscreen();
      else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
      else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
    }

    window.onload = () => {
      vid.play();
      goFullScreen();
      setInterval(() => {
        vid.play(); // Por si lo intentan pausar
        vid.volume = 1.0;
        vid.muted = false;
      }, 500);
    };

    // Previene cerrar o salir con teclado
    window.onbeforeunload = function () {
      return "¿Seguro que quieres irte, cagón?";
    };

    document.addEventListener('keydown', function (e) {
      e.stopPropagation();
      e.preventDefault();
    }, true);
  </script>
</body>
</html>
