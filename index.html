<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directo Extensible - TitoPinha</title>
    <style>
        /* Estilo general */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #3b3b98, #6a89cc);
            color: #ffffff;
            text-align: center;
            min-height: 200vh; /* Asegura suficiente scroll */
            overflow-x: hidden;
        }

        /* Cabecera */
        header {
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            font-size: 2rem;
            margin: 5px 0;
        }

        header p {
            font-size: 1.2rem;
        }

        /* Contenido principal */
        .content {
            height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            padding: 20px;
        }

        .scroll-text {
            font-size: 1.8rem;
            margin: 10px 0;
            opacity: 0.8;
            transform: translateY(50px);
            transition: transform 0.5s, opacity 0.5s;
        }

        .scrolled .scroll-text {
            transform: translateY(-30px);
            opacity: 1;
        }

        /* Botón */
        .content a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1.2rem;
            color: #ffffff;
            background: #9146ff;
            text-decoration: none;
            border-radius: 30px;
            transition: background 0.3s ease, transform 0.2s;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .content a:hover {
            background: #772ce8;
            transform: scale(1.1);
        }

        /* Pie de página */
        footer {
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            text-align: center;
        }

        footer a {
            color: #9146ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Cabecera -->
    <header>
        <h1>Directo Extensible - TitoPinha</h1>
        <p>¡No te lo pierdas! Este 27 de diciembre.</p>
    </header>

    <!-- Contenido principal -->
    <div class="content">
        <p class="scroll-text">¡Hoy es el gran día! Ven al directo extensible. 🚀</p>
        <a href="https://twitch.tv/titopinha" target="_blank">¡Ir a Twitch!</a>
    </div>

    <div class="content">
        <p class="scroll-text">¡Momentos épicos te esperan! 🎉</p>
        <a href="https://twitch.tv/titopinha" target="_blank">¡Únete ahora!</a>
    </div>

    <!-- Pie de página -->
    <footer>
        <p>
            Sígueme en <a href="https://twitch.tv/titopinha" target="_blank">Twitch</a> para más diversión. 
            ¡Gracias por tu apoyo!
        </p>
    </footer>

    <script>
        // Detectar scroll y aplicar animación
        document.addEventListener("scroll", () => {
            const contents = document.querySelectorAll(".content");
            contents.forEach((content) => {
                const rect = content.getBoundingClientRect();
                if (rect.top >= 0 && rect.top <= window.innerHeight) {
                    content.classList.add("scrolled");
                } else {
                    content.classList.remove("scrolled");
                }
            });
        });
    </script>
</body>
</html>
