<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directo Extensible - TitoPinha</title>
    <style>
        /* Estilo general */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #3b3b98, #6a89cc);
            color: #ffffff;
            text-align: center;
            min-height: 200vh; /* Asegura suficiente scroll */
            overflow-x: hidden;
        }

        /* Cabecera */
        header {
            position: sticky;
            top: 0;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            z-index: 10;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            font-size: 2rem;
        }

        header p {
            font-size: 1.2rem;
            margin: 5px 0;
        }

        /* Contenido principal */
        .content {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .content .scroll-text {
            font-size: 2rem;
            opacity: 0.9;
            transform: translateY(50px);
            transition: transform 0.5s, opacity 0.5s;
        }

        /* Efecto de scroll */
        .content.scrolled .scroll-text {
            transform: translateY(-100px);
            opacity: 1;
        }

        /* Pie de página */
        footer {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            position: relative;
            text-align: center;
        }

        footer a {
            color: #9146ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Cabecera -->
    <header>
        <h1>Directo Extensible - TitoPinha</h1>
        <p>¡No te lo pierdas! Este 27 de diciembre.</p>
    </header>

    <!-- Contenido principal -->
    <div class="content">
        <p class="scroll-text">¡Hoy es el gran día! Métete al stream extensible. 🚀</p>
    </div>

    <div class="content">
        <p class="scroll-text">Únete al caos en Twitch. ¡Te esperamos! 🎉</p>
    </div>

    <!-- Pie de página -->
    <footer>
        <p>
            Sígueme en <a href="https://twitch.tv/titopinha" target="_blank">Twitch</a> y mantente al tanto de futuros eventos. 
            ¡Gracias por el apoyo!
        </p>
    </footer>

    <script>
        // Detectar scroll y aplicar clases
        document.addEventListener("scroll", () => {
            const contents = document.querySelectorAll(".content");
            contents.forEach((content) => {
                const rect = content.getBoundingClientRect();
                if (rect.top >= 0 && rect.top <= window.innerHeight) {
                    content.classList.add("scrolled");
                } else {
                    content.classList.remove("scrolled");
                }
            });
        });
    </script>
</body>
</html>
